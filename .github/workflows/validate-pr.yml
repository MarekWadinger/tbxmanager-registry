name: Validate PR

on:
  pull_request:
    paths:
      - 'packages/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find changed package files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'packages/*/package.json' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: Validate packages
        if: steps.changed.outputs.files != ''
        run: |
          FAILED=0
          for f in ${{ steps.changed.outputs.files }}; do
            echo "=== Validating $f ==="
            if python3 scripts/validate_package.py "$f" --check-urls; then
              echo "PASS: $f"
            else
              FAILED=1
            fi
            echo ""
          done
          exit $FAILED
