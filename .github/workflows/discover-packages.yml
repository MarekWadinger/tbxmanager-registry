name: Discover Packages

on:
  schedule:
    - cron: '0 8 * * 0'  # Sundays 8 AM UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discover new packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/discover_packages.py
